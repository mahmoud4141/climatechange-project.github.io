<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irrigation System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🚰</text></svg>">
<style>
:root { --green: #2d5a27; --light-green: #e8f5e9; --text: #333; --red: #c0392b; }
body { font-family: sans-serif; background: #f0f4f2; display: flex; justify-content: center; padding: 20px; color: var(--text); }
.app-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
h1 { color: var(--green); text-align: center; margin-bottom: 5px; font-size: 1.6rem; }
.input-row { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
button { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
button:hover { background: #1e3d1a; }
#results { margin-top: 20px; background: var(--light-green); padding: 15px; border-radius: 8px; border-left: 5px solid var(--green); display: none; }
.status-text { font-size: 1.2rem; font-weight: bold; color: var(--green); margin: 10px 0; }
.status-off { color: var(--red); }

.student-info { 
    text-align: center; 
    margin-top: 25px; 
    padding-top: 15px; 
    border-top: 1px solid #eee; 
    font-size: 0.85rem; 
    color: #666; 
}
.student-info a { color: var(--green); text-decoration: none; font-weight: bold; }
</style>
</head>
<body>

<div class="app-box">
  <h1>Climate Change & Sustainability</h1>
  <h2 style="text-align:center; font-size:1.1rem; color:#666; margin-top:0;">Simple Irrigation System</h2>

  <div class="input-row">
    <label>Crop</label>
    <select id="crop">
      <option value="1.3">Rice</option>
      <option value="1.1">Corn</option>
      <option value="0.9">Wheat</option>
      <option value="0.7">Potato</option>
    </select>
  </div>

  <div class="input-row">
    <label>Soil Type</label>
    <select id="soil">
      <option value="1.5">Sandy soil</option>
      <option value="1.0">Loamy soil</option>
      <option value="0.7">Clay soil</option>
    </select>
  </div>

  <div class="input-row">
    <label>Air Temperature (-10 to 60°C)</label>
    <input type="number" id="temp" value="30" min="-10" max="60">
  </div>

  <div class="input-row">
    <label>Soil Moisture (0 to 100%)</label>
    <input type="number" id="moisture" value="25" min="0" max="100">
  </div>

  <button id="check-btn">Check my Field</button>

  <div id="results">
    <strong>Field Status:</strong>
    <div id="pumpState" class="status-text">...</div>
    <p>Water to add: <span id="waterVol">0</span> Liters per Acre</p>
  </div>

  <div class="student-info">
    <p>Made by: <b>Mahmoud Wageh</b> | 
       <a href="https://github.com/mahmoud4141/climatechange-project.github.io" target="_blank">Project Files Link</a>
    </p>
  </div>
</div>

<script>
  const trainingData = [
      [10, 40, "ON"], [15, 38, "ON"], [25, 35, "ON"],
      [45, 25, "OFF"], [55, 20, "OFF"], [40, 30, "OFF"],
      [20, 32, "ON"], [60, 15, "OFF"]
  ];

  function checkField() {
      let m = parseFloat(document.getElementById('moisture').value);
      let t = parseFloat(document.getElementById('temp').value);
      const cropFactor = parseFloat(document.getElementById('crop').value);
      const soilFactor = parseFloat(document.getElementById('soil').value);

      // Validation limit check
      if (m < 0 || m > 100 || t < -10 || t > 60) {
          alert("Error: Please enter a valid moisture (0-100) and temperature (-10 to 60).");
          return;
      }

      const nearest = trainingData.map(p => {
          const dist = Math.sqrt(Math.pow(m - p[0], 2) + Math.pow(t - p[1], 2));
          return { label: p[2], dist };
      }).sort((a,b) => a.dist - b.dist)[0];

      const resultsDiv = document.getElementById('results');
      const pumpSpan = document.getElementById('pumpState');
      const waterSpan = document.getElementById('waterVol');

      resultsDiv.style.display = "block";
      if(nearest.label === "ON") {
          pumpSpan.innerText = "Pump is on: field is dry";
          pumpSpan.classList.remove('status-off');
          waterSpan.innerText = Math.round(4000 * cropFactor * soilFactor);
      } else {
          pumpSpan.innerText = "pump is off: soil is good";
          pumpSpan.classList.add('status-off');
          waterSpan.innerText = "0";
      }
  }

  document.getElementById('check-btn').addEventListener('click', checkField);
</script>

</body>
</html>
